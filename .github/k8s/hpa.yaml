apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: wisecow
  labels:
    app: wisecow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wisecow
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70