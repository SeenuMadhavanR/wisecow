name: CI/CD

env:
  APP_VERSION: "1.0"
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/wisecow

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  docker:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ env.APP_VERSION }}.${{ github.run_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.APP_VERSION }}.${{ github.run_number }}

  deploy:
    runs-on: ubuntu-latest
    needs: docker  # only runs if docker job succeeds

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Deploy to EKS
        run: |
          kubectl set image deployment/wisecow \
            wisecow=${{ env.IMAGE_NAME }}:${{ env.APP_VERSION }}.${{ github.run_number }}
          kubectl rollout status deployment/wisecow --timeout=120s